name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 或 master，根據您的主分支名稱調整

# 允許此腳本寫入以及讀取儲存庫資料
permissions:
  contents: read
  pages: write
  id-token: write

# 允許並行部署避免衝突
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          # 以下變數透過 GitHub Repository Secrets 動態注入
          VITE_GOOGLE_APP_SCRIPT_URL: ${{ secrets.VITE_GOOGLE_APP_SCRIPT_URL }}
          VITE_PASS_THRESHOLD: ${{ secrets.VITE_PASS_THRESHOLD }}
          VITE_QUESTION_COUNT: ${{ secrets.VITE_QUESTION_COUNT }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite 預設打包出來的資料夾

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
